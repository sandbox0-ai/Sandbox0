replicaCount: 3

image:
  repository: sandbox0/storage-proxy
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "storage-proxy"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext: {}

service:
  type: ClusterIP
  grpcPort: 8080
  httpPort: 8081
  metricsPort: 9090

ingress:
  enabled: false

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

pdb:
  enabled: true
  minAvailable: 2

config:
  grpc_addr: "0.0.0.0"
  grpc_port: 8080
  http_addr: "0.0.0.0"
  http_port: 8081
  metrics_port: 9090
  metrics_enabled: true
  log_level: "info"
  audit_log: true
  audit_file: "/var/log/storage-proxy/audit.log"
  # S3 / JuiceFS
  meta_url: "${META_URL}"
  s3_bucket: "${S3_BUCKET}"
  s3_region: "${S3_REGION}"
  s3_endpoint: "${S3_ENDPOINT}"
  s3_access_key: "${S3_ACCESS_KEY}"
  s3_secret_key: "${S3_SECRET_KEY}"
  default_cache_size: "10G"
  default_cache_dir: "/var/lib/storage-proxy/cache"
  cache_root: "/var/lib/storage-proxy/cache"
  # Limits
  max_ops_per_second: 10000
  max_bytes_per_second: 1073741824
  # Auth
  internal_auth_public_key: "${INTERNAL_AUTH_PUBLIC_KEY}"
  database_url: "${DATABASE_URL}"

env:
  - name: META_URL
    valueFrom:
      secretKeyRef:
        name: storage-proxy-secrets
        key: meta-url
  - name: S3_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: storage-proxy-secrets
        key: aws-access-key-id
        optional: true
  - name: S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: storage-proxy-secrets
        key: aws-secret-access-key
        optional: true
  - name: S3_REGION
    value: "us-east-1"
  - name: S3_BUCKET
    value: "sandbox0-bucket"
  - name: S3_ENDPOINT
    value: ""
  - name: INTERNAL_AUTH_PUBLIC_KEY
    valueFrom:
      secretKeyRef:
        name: storage-proxy-secrets
        key: internal-auth-public-key
        optional: true
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: storage-proxy-secrets
        key: database-url
        optional: true

secrets:
  jwtSecret: "CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_STRING"
  postgresUrl: "postgres://juicefs:password@postgres:5432/juicefs?sslmode=disable"
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

persistence:
  cache:
    enabled: true
    storageClassName: "fast-ssd"
    accessModes:
      - ReadWriteOnce
    size: 100Gi

volumeMounts:
  - name: cache
    mountPath: /var/lib/storage-proxy/cache
  - name: logs
    mountPath: /var/log/storage-proxy

volumes:
  - name: logs
    emptyDir: {}
