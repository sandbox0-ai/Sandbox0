# Default values for storage-proxy

replicaCount: 3

image:
  repository: sandbox0/storage-proxy
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: false  # Needs to write cache files
  runAsNonRoot: true
  runAsUser: 1000

grpcService:
  type: ClusterIP
  port: 8080

httpService:
  type: ClusterIP
  port: 8081

metricsService:
  type: ClusterIP
  port: 9090

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# Persistent volume for cache
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 100Gi
  existingClaim: ""

# Secrets - only for file-based secrets (keys, certs)
secrets:
  internalJwtSecretName: "sandbox0-internal-jwt"
  internalJwtPublicKeyKey: "public.key"

# RBAC for watching pods
rbac:
  create: true

# Application config - directly maps to config.yaml (snake_case)
config:
  # gRPC Server
  grpc_addr: "0.0.0.0"
  grpc_port: 8080

  # HTTP Management API
  http_addr: "0.0.0.0"
  http_port: 8081

  # Database - configure directly (no env var needed)
  database_url: "postgres://user:pass@postgres:5432/sandbox0"

  # JuiceFS - configure directly (no env var needed)
  meta_url: "postgres://user:pass@postgres:5432/juicefs"
  s3_bucket: "sandbox0-data"
  s3_region: "us-east-1"
  s3_endpoint: "https://s3.amazonaws.com"
  s3_access_key: "your-access-key"
  s3_secret_key: "your-secret-key"
  s3_session_token: ""

  # Cache defaults
  default_cache_size: "1G"
  default_cache_dir: "/var/lib/storage-proxy/cache"
  default_cluster_id: "default"
  cache_root: "/var/lib/storage-proxy/cache"

  # Security - file path for public key
  internal_auth_public_key_path: "/config/internal_jwt_public.key"

  # Monitoring
  metrics_enabled: true
  metrics_port: 9090

  # Logging
  log_level: "info"
  audit_log: true
  audit_file: "/var/log/storage-proxy/audit.log"

  # Rate limiting
  max_ops_per_second: 10000
  max_bytes_per_second: 1073741824  # 1GB/s

  # Kubernetes
  kubeconfig_path: ""
