apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "storage-proxy.fullname" . }}
  labels:
    {{- include "storage-proxy.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "storage-proxy.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "storage-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "storage-proxy.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "storage-proxy.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.grpcPort }}
              name: grpc
              protocol: TCP
            - containerPort: {{ .Values.service.httpPort }}
              name: http
              protocol: TCP
            - containerPort: {{ .Values.service.metricsPort }}
              name: metrics
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- toYaml .Values.volumeMounts | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.httpPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.service.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.httpPort }}
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: {{ include "storage-proxy.fullname" . }}-config
        {{- toYaml .Values.volumes | nindent 8 }}
  {{- if .Values.persistence.cache.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache
      spec:
        accessModes:
          {{- toYaml .Values.persistence.cache.accessModes | nindent 10 }}
        storageClassName: {{ .Values.persistence.cache.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistence.cache.size }}
  {{- end }}
