{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "storage-proxy.fullname" . }}
  labels:
    {{- include "storage-proxy.labels" . | nindent 4 }}
rules:
  # Watch pods for volume mounting status
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]
  # Create events for volume operations
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "storage-proxy.fullname" . }}
  labels:
    {{- include "storage-proxy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "storage-proxy.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "storage-proxy.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
