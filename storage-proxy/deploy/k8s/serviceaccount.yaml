apiVersion: v1
kind: ServiceAccount
metadata:
  name: storage-proxy
  namespace: sandbox0-system
  labels:
    app: storage-proxy
  # For IRSA (IAM Roles for Service Accounts on EKS)
  # Uncomment and set your role ARN
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/storage-proxy-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: storage-proxy
  namespace: sandbox0-system
rules:
# Add any Kubernetes API permissions needed
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: storage-proxy
  namespace: sandbox0-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: storage-proxy
subjects:
- kind: ServiceAccount
  name: storage-proxy
  namespace: sandbox0-system

