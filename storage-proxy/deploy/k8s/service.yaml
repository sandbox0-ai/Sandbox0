apiVersion: v1
kind: Service
metadata:
  name: storage-proxy
  namespace: sandbox0-system
  labels:
    app: storage-proxy
    component: storage
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: grpc
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: storage-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: storage-proxy-metrics
  namespace: sandbox0-system
  labels:
    app: storage-proxy
    component: storage
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: storage-proxy

