apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage-proxy
  namespace: sandbox0-system
  labels:
    app: storage-proxy
    component: storage
spec:
  serviceName: storage-proxy
  replicas: 3
  selector:
    matchLabels:
      app: storage-proxy
  template:
    metadata:
      labels:
        app: storage-proxy
        component: storage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: storage-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: storage-proxy
        image: sandbox0/storage-proxy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: grpc
          protocol: TCP
        - containerPort: 8081
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        # Configuration from ConfigMap
        - name: GRPC_ADDR
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: GRPC_ADDR
        - name: GRPC_PORT
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: GRPC_PORT
        - name: HTTP_ADDR
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: HTTP_ADDR
        - name: HTTP_PORT
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: HTTP_PORT
        - name: METRICS_PORT
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: METRICS_PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: LOG_LEVEL
        - name: AUDIT_LOG
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: AUDIT_LOG
        - name: AUDIT_FILE
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: AUDIT_FILE
        - name: DEFAULT_S3_REGION
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: DEFAULT_S3_REGION
        - name: DEFAULT_CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: DEFAULT_CACHE_SIZE
        - name: DEFAULT_CACHE_DIR
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: DEFAULT_CACHE_DIR
        
        # Secrets
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: storage-proxy-secrets
              key: jwt-secret
        - name: DEFAULT_META_URL
          valueFrom:
            secretKeyRef:
              name: storage-proxy-secrets
              key: postgres-url
        
        # AWS credentials (if not using IRSA)
        # Comment these out if using IRSA
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: storage-proxy-secrets
              key: aws-access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: storage-proxy-secrets
              key: aws-secret-access-key
              optional: true
        
        # AWS region
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: storage-proxy-config
              key: DEFAULT_S3_REGION
        
        # For IRSA (IAM Roles for Service Accounts)
        # These are automatically injected by EKS when using IRSA
        # - name: AWS_WEB_IDENTITY_TOKEN_FILE
        #   value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
        # - name: AWS_ROLE_ARN
        #   value: arn:aws:iam::ACCOUNT_ID:role/storage-proxy-role
        
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        
        volumeMounts:
        - name: cache
          mountPath: /var/lib/storage-proxy/cache
        - name: logs
          mountPath: /var/log/storage-proxy
        
        # For IRSA token
        # - name: aws-iam-token
        #   mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
        #   readOnly: true
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      
      volumes:
      - name: logs
        emptyDir: {}
      
      # For IRSA token
      # - name: aws-iam-token
      #   projected:
      #     defaultMode: 420
      #     sources:
      #     - serviceAccountToken:
      #         audience: sts.amazonaws.com
      #         expirationSeconds: 86400
      #         path: token
  
  volumeClaimTemplates:
  - metadata:
      name: cache
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: fast-ssd  # Use your cluster's fast storage class
      resources:
        requests:
          storage: 100Gi

