apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sandbox0-system

resources:
- namespace.yaml
- serviceaccount.yaml
- secret.yaml
- deployment.yaml
- service.yaml
- poddisruptionbudget.yaml
- networkpolicy.yaml

# For production, use a specific image tag
images:
- name: sandbox0/storage-proxy
  newTag: v1.0.0

# Add labels to all resources
commonLabels:
  app.kubernetes.io/name: storage-proxy
  app.kubernetes.io/component: storage
  app.kubernetes.io/part-of: sandbox0

# Add annotations to all resources
commonAnnotations:
  app.kubernetes.io/version: "1.0.0"

