apiVersion: v1
kind: Secret
metadata:
  name: storage-proxy-secrets
  namespace: sandbox0-system
type: Opaque
stringData:
  # JWT secret for token signing/validation
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_STRING"
  
  # PostgreSQL connection URL for JuiceFS metadata
  postgres-url: "postgres://juicefs:password@postgres:5432/juicefs?sslmode=disable"
  
  # AWS credentials (if not using IRSA)
  aws-access-key-id: ""
  aws-secret-access-key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-proxy-config
  namespace: sandbox0-system
data:
  # Default S3 configuration
  DEFAULT_S3_REGION: "us-east-1"
  DEFAULT_S3_ENDPOINT: ""
  DEFAULT_CACHE_SIZE: "10G"
  DEFAULT_CACHE_DIR: "/var/lib/storage-proxy/cache"
  
  # Server configuration
  GRPC_ADDR: "0.0.0.0"
  GRPC_PORT: "8080"
  HTTP_ADDR: "0.0.0.0"
  HTTP_PORT: "8081"
  METRICS_PORT: "9090"
  
  # Logging
  LOG_LEVEL: "info"
  AUDIT_LOG: "true"
  AUDIT_FILE: "/var/log/storage-proxy/audit.log"
  
  # Performance tuning
  MAX_OPS_PER_SECOND: "10000"
  MAX_BYTES_PER_SECOND: "1073741824"  # 1GB/s

