name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: helm/kind-action@v1
        with:
          version: v0.30.0
          config: infra/tests/e2e/kind-config.yaml
          cluster_name: sandbox0-e2e

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run E2E
        working-directory: infra
        run: make test-e2e
