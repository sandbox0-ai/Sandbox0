name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: helm/kind-action@v1
        with:
          version: v0.30.0
          config: infra/tests/e2e/kind-config.yaml
          cluster_name: sandbox0-e2e-${{ matrix.arch }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build Docker Image
        working-directory: infra
        run: make docker-build

      - name: Load Image to Kind
        run: kind load docker-image sandbox0ai/infra:latest --name sandbox0-e2e-${{ matrix.arch }}

      - name: Run E2E
        working-directory: infra
        env:
          E2E_USE_EXISTING_CLUSTER: "true"
          E2E_CLUSTER_NAME: sandbox0-e2e-${{ matrix.arch }}
        run: make test-e2e
