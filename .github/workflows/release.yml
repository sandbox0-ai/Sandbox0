name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_REPO: sandbox0ai/infra
  HELM_REPO_URL: https://charts.sandbox0.ai
  HELM_REPO_DOMAIN: charts.sandbox0.ai
  DOCS_BUNDLE_PREFIX: sandbox0-docs

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
    steps:
      - name: Extract and validate version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be in the form vMAJOR.MINOR.PATCH[-PRERELEASE], got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

  package:
    name: Package release assets
    needs: prepare-release
    uses: ./.github/workflows/release-package.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}

  publish-dashboard-core:
    name: Publish dashboard-core package
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download dashboard-core package artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-core-package-${{ needs.prepare-release.outputs.version }}
          path: .release-npm

      - name: Resolve dashboard-core package path
        run: |
          PACKAGE_PATH="$(find .release-npm -maxdepth 1 -type f -name '*.tgz' | head -n 1)"
          test -n "${PACKAGE_PATH}"
          test -f "${PACKAGE_PATH}"
          echo "PACKAGE_PATH=${PACKAGE_PATH}" >> "$GITHUB_ENV"

      - name: Check whether dashboard-core version already exists on npm
        id: dashboard_core_npm
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          if npm view "@sandbox0/dashboard-core@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@sandbox0/dashboard-core@${VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish dashboard-core package to npm
        if: steps.dashboard_core_npm.outputs.published != 'true'
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          NPM_TAG="latest"

          if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" == "true" ]]; then
            case "${VERSION}" in
              *-alpha* ) NPM_TAG="alpha" ;;
              *-beta* ) NPM_TAG="beta" ;;
              *-rc* ) NPM_TAG="rc" ;;
              * ) NPM_TAG="next" ;;
            esac
          fi

          npm publish "${PACKAGE_PATH}" --tag "${NPM_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-image:
    name: Publish infra image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare-release
      - package
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner space
        uses: ./.github/actions/free-runner-space

      - name: Restore shared infra build cache
        id: infra-build-cache
        uses: ./.github/actions/restore-infra-build-cache
        with:
          cache-key-suffix: ${{ matrix.arch }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local binaries
        run: make build-local-all

      - name: Save shared infra build cache
        uses: ./.github/actions/save-infra-build-cache
        with:
          cache-key-suffix: ${{ matrix.arch }}
          cache-hit: ${{ steps.infra-build-cache.outputs.cache-hit }}

      - name: Determine arch image tag
        id: docker_tag
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "tag=${IMAGE_REPO}:${VERSION}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build arch image with Dockerfile.local
        env:
          TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker build -t "${TAG}" -f Dockerfile.local .

      - name: Push arch image
        env:
          TAG: ${{ steps.docker_tag.outputs.tag }}
        run: docker push "${TAG}"

  publish-image-manifest:
    name: Publish infra image manifest
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish-image
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          AMD64_IMAGE="${IMAGE_REPO}:${VERSION}-amd64"
          ARM64_IMAGE="${IMAGE_REPO}:${VERSION}-arm64"

          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION}" \
            "${AMD64_IMAGE}" \
            "${ARM64_IMAGE}"

          if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" != "true" ]]; then
            docker buildx imagetools create \
              -t "${IMAGE_REPO}:latest" \
              "${AMD64_IMAGE}" \
              "${ARM64_IMAGE}"
          fi

  publish-helm:
    name: Publish infra-operator Helm chart
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
      - publish-image-manifest
    steps:
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: infra-operator-chart-${{ needs.prepare-release.outputs.version }}
          path: .cr-release-packages

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish chart to GitHub Packages (GHCR OCI)
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          helm push ".cr-release-packages/infra-operator-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"

      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${remote_url}" gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          pushd "${tmp_dir}"
          git init -b gh-pages
          touch .nojekyll
          printf '%s\n' "${HELM_REPO_DOMAIN}" > CNAME
          cat > index.yaml <<'EOF'
          apiVersion: v1
          entries: {}
          EOF
          git add .nojekyll CNAME index.yaml
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m 'Initialize gh-pages branch'
          git remote add origin "${remote_url}"
          git push origin gh-pages
          popd

      - name: Publish chart to Helm repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          CHART_PACKAGE=".cr-release-packages/infra-operator-${VERSION}.tgz"
          PAGES_URL="${HELM_REPO_URL}"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${tmp_dir}/gh-pages"

          cp "${CHART_PACKAGE}" "${tmp_dir}/gh-pages/"
          touch "${tmp_dir}/gh-pages/.nojekyll"
          printf '%s\n' "${HELM_REPO_DOMAIN}" > "${tmp_dir}/gh-pages/CNAME"

          if [[ -f "${tmp_dir}/gh-pages/index.yaml" ]]; then
            helm repo index "${tmp_dir}/gh-pages" \
              --url "${PAGES_URL}" \
              --merge "${tmp_dir}/gh-pages/index.yaml"
          else
            helm repo index "${tmp_dir}/gh-pages" --url "${PAGES_URL}"
          fi

          pushd "${tmp_dir}/gh-pages"
          if git diff --quiet --exit-code -- .; then
            echo "Helm repo already up to date"
            exit 0
          fi

          git add .nojekyll CNAME index.yaml "infra-operator-${VERSION}.tgz"
          git \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "Publish infra-operator chart ${VERSION}"
          git push origin gh-pages
          popd

  publish-docs:
    name: Publish versioned docs bundle
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
      - publish-helm
    steps:
      - name: Download docs bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-bundle-v${{ needs.prepare-release.outputs.version }}
          path: .release-docs

      - name: Resolve docs bundle path
        run: |
          VERSION="v${{ needs.prepare-release.outputs.version }}"
          BUNDLE_NAME="${DOCS_BUNDLE_PREFIX}-${VERSION}.tar.gz"
          BUNDLE_PATH=".release-docs/${BUNDLE_NAME}"
          test -f "${BUNDLE_PATH}"
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> "$GITHUB_ENV"
          echo "BUNDLE_PATH=${BUNDLE_PATH}" >> "$GITHUB_ENV"

      - name: Create or update GitHub Release with docs bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          NOTES=$(cat <<EOF
          Automated release for ${TAG}.

          Published artifacts:
          - Docker image: docker.io/${IMAGE_REPO}:${{ needs.prepare-release.outputs.version }}
          - Helm OCI: oci://ghcr.io/${OWNER_LOWER}/charts/infra-operator
          - Helm repo: https://sandbox0-ai.github.io/sandbox0
          - Docs bundle: ${BUNDLE_NAME}
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            IS_IMMUTABLE=$(gh release view "${TAG}" --json isImmutable --jq '.isImmutable')
            if [[ "${IS_IMMUTABLE}" == "true" ]]; then
              echo "Release ${TAG} already exists and is immutable. Delete the release before rerunning this workflow for the same tag."
              exit 1
            fi

            gh release edit "${TAG}" --title "${TAG}" --notes "${NOTES}"
            gh release upload "${TAG}" "${BUNDLE_PATH}" --clobber
          else
            args=("${BUNDLE_PATH}" --title "${TAG}" --notes "${NOTES}")
            if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${TAG}" "${args[@]}"
          fi

  trigger-cloudflare-pages:
    name: Trigger Cloudflare Pages deploy
    runs-on: ubuntu-latest
    needs:
      - publish-docs
    steps:
      - name: Trigger website build hook
        env:
          CLOUDFLARE_PAGES_BUILD_HOOK_URL: ${{ secrets.CLOUDFLARE_PAGES_BUILD_HOOK_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ -z "${CLOUDFLARE_PAGES_BUILD_HOOK_URL}" ]]; then
            echo "CLOUDFLARE_PAGES_BUILD_HOOK_URL is not configured; skipping Cloudflare Pages deploy trigger."
            exit 0
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-all-errors \
            --max-time 30 \
            -X POST \
            "${CLOUDFLARE_PAGES_BUILD_HOOK_URL}"

          echo "Triggered Cloudflare Pages deploy after publishing docs bundle for ${RELEASE_TAG}."
