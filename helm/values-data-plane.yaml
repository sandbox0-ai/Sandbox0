# Data-plane installation values
controlPlane:
  enabled: false
dataPlane:
  enabled: true

global:
  internalAuth:
    controlPlane:
      secretName: "sandbox0-internal-jwt-control-plane"
      publicKeyKey: "public.key"
    dataPlane:
      secretName: "sandbox0-internal-jwt-data-plane"
      privateKeyKey: "private.key"
      publicKeyKey: "public.key"

internal-gateway:
  enabled: true
  fullnameOverride: "internal-gateway"

manager:
  enabled: true
  fullnameOverride: "manager"

storage-proxy:
  enabled: true
  fullnameOverride: "storage-proxy"

netd:
  enabled: true
  fullnameOverride: "netd"
