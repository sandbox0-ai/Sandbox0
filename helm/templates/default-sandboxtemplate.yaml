{{- if and .Values.dataPlane.enabled .Values.manager.enabled }}
---
apiVersion: sandbox0.ai/v1alpha1
kind: SandboxTemplate
metadata:
  name: {{ .Values.manager.config.default_template_name }}
  namespace: {{ .Values.manager.config.default_template_namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: sandbox0
  annotations:
    # Ensure this is created after CRDs are installed and namespace is created by manager
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  description: "Default sandbox environment with Python and common tools"
  displayName: "Default Python Environment"
  tags:
    - "python"
    - "default"

  # Main container configuration
  mainContainer:
    image: {{ .Values.manager.config.default_template_image }}
    imagePullPolicy: IfNotPresent
    resources:
      cpu: "2"
      memory: "4Gi"

  # Pool strategy
  pool:
    minIdle: 1
    maxIdle: 3
    autoScale: true

  # Lifecycle policy (in seconds)
  lifecycle:
    defaultTTL: 3600      # 1 hour
    maxTTL: 86400         # 24 hours
    idleTimeout: 600      # 10 minutes

  # Network policy
  network:
    mode: "allow-all"

  # Access control
  public: true
{{- end }}
