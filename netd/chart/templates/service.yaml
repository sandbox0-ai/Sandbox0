apiVersion: v1
kind: Service
metadata:
  name: {{ include "netd.fullname" . }}-metrics
  labels:
    {{- include "netd.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metricsService.type }}
  ports:
    - port: {{ .Values.metricsService.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "netd.selectorLabels" . | nindent 4 }}
