image:
  repository: sandbox0/netd
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "netd"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext: {}

securityContext:
  privileged: true
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

affinity: {}

config:
  log_level: "info"
  metrics_port: 9090
  health_port: 8080
  node_name: "${NODE_NAME}"
  namespace: "${NAMESPACE}"
  kube_config: ""
  resync_period: "30s"
  proxy_listen_addr: "0.0.0.0"
  proxy_http_port: 18080
  proxy_https_port: 18443
  dns_resolvers:
    - "8.8.8.8:53"
  metrics_report_interval: "10s"
  fail_closed: true
  storage_proxy_cidr: "10.43.0.0/16"
  cluster_dns_cidr: "10.96.0.10/32"
  internal_gateway_cidr: "10.42.0.0/16"
  procd_port: 49983
  use_ebpf: true
  bpf_fs_path: "/sys/fs/bpf"
  use_edt: true

env:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace

volumes:
  - name: xtables-lock
    hostPath:
      path: /run/xtables.lock
      type: FileOrCreate
  - name: lib-modules
    hostPath:
      path: /lib/modules
      type: Directory
  - name: bpf-fs
    hostPath:
      path: /sys/fs/bpf
      type: Directory

volumeMounts:
  - name: xtables-lock
    mountPath: /run/xtables.lock
    readOnly: false
  - name: lib-modules
    mountPath: /lib/modules
    readOnly: true
  - name: bpf-fs
    mountPath: /sys/fs/bpf
    mountPropagation: Bidirectional
