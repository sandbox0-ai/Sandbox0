# Default values for internal-gateway

replicaCount: 1

image:
  repository: sandbox0ai/internal-gateway
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8443

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# Secrets - only for file-based secrets (keys, certs)
# Uses global.jwt.internalJwtSecretName by default
secrets:
  internalJwtSecretName: ""  # defaults to {{ .Values.global.jwt.internalJwtSecretName }}
  internalJwtPrivateKeyKey: ""  # defaults to {{ .Values.global.jwt.privateKeyKey }}

# Application config - directly maps to config.yaml (snake_case)
config:
  http_port: 8443
  log_level: "info"
  manager_url: "http://manager:8080"
  storage_proxy_url: "http://storage-proxy:8081"
  internal_jwt_private_key_path: "/secrets/internal_jwt_private.key"
  proxy_timeout: "30s"
  shutdown_timeout: "30s"
  health_check_period: "10s"
