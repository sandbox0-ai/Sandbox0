replicaCount: 3

image:
  repository: sandbox0/internal-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "internal-gateway"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8443"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
  hosts:
    - host: api.sandbox0.ai
      paths:
        - path: /api
          pathType: Prefix
        - path: /healthz
          pathType: Exact
  tls:
   - secretName: sandbox0-tls
     hosts:
       - api.sandbox0.ai

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - internal-gateway
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
  labelSelector:
    matchLabels:
      app: internal-gateway

config:
  http_port: 8443
  log_level: "info"
  manager_url: "http://manager.sandbox0-system.svc.cluster.local:8080"
  storage_proxy_url: "http://storage-proxy.sandbox0-system.svc.cluster.local:8081"
  internal_jwt_private_key_path: "/secrets/internal_jwt_private.key"
  proxy_timeout: "30s"
  shutdown_timeout: "30s"
  health_check_period: "10s"

env: []

secrets:
  # In production, these should be managed externally
  internalJwtKeySecretName: "internal-jwt-key"

volumeMounts:
- name: internal-jwt-key
  mountPath: /secrets
  readOnly: true

volumes:
- name: internal-jwt-key
  secret:
    secretName: internal-jwt-key
