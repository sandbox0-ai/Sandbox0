apiVersion: v1
kind: Secret
metadata:
  name: internal-gateway-secrets
  namespace: sandbox0-system
type: Opaque
stringData:
  # Database connection string
  # Replace with actual credentials in production
  database-url: "postgres://sandbox0:password@postgres.sandbox0-system.svc.cluster.local:5432/sandbox0?sslmode=require"
  
  # JWT secret for token signing
  # Generate with: openssl rand -base64 32
  jwt-secret: "REPLACE_WITH_SECURE_SECRET_IN_PRODUCTION"

