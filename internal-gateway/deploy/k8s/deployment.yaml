apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-gateway
  namespace: sandbox0-system
  labels:
    app: internal-gateway
    app.kubernetes.io/name: internal-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: internal-gateway
  template:
    metadata:
      labels:
        app: internal-gateway
        app.kubernetes.io/name: internal-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: internal-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
      - name: internal-gateway
        image: sandbox0/internal-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8443
          protocol: TCP
        env:
        - name: GATEWAY_HTTP_PORT
          value: "8443"
        - name: GATEWAY_LOG_LEVEL
          value: "info"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: internal-gateway-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: internal-gateway-secrets
              key: jwt-secret
        - name: MANAGER_URL
          value: "http://manager.sandbox0-system.svc.cluster.local:8080"
        - name: STORAGE_PROXY_URL
          value: "http://storage-proxy.sandbox0-system.svc.cluster.local:8081"
        - name: RATE_LIMIT_RPS
          value: "100"
        - name: RATE_LIMIT_BURST
          value: "200"
        - name: ENABLE_METRICS
          value: "true"
        - name: ENABLE_AUDIT
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - internal-gateway
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: internal-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: internal-gateway
  namespace: sandbox0-system
  labels:
    app: internal-gateway
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8443
    targetPort: http
    protocol: TCP
  selector:
    app: internal-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: internal-gateway
  namespace: sandbox0-system
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: internal-gateway
  namespace: sandbox0-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: internal-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: internal-gateway
  namespace: sandbox0-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: internal-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

