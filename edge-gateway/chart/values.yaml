# Default values for edge-gateway

replicaCount: 2

image:
  repository: sandbox0/edge-gateway
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: edge-gateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# Secrets - only for file-based secrets (keys, certs)
secrets:
  internalJwtSecretName: "sandbox0-internal-jwt"
  internalJwtPrivateKeyKey: "private.key"

# Application config - directly maps to config.yaml (snake_case)
config:
  edition: "self-hosted"
  http_port: 8080
  log_level: "info"
  internal_gateway_url: "http://internal-gateway:8443"

  # Database and JWT - configure directly (no env var needed)
  database_url: "postgres://user:pass@postgres:5432/sandbox0"
  jwt_secret: "change-me-in-production-use-strong-random-secret"

  # JWT
  jwt_access_token_ttl: "15m"
  jwt_refresh_token_ttl: "168h"
  internal_jwt_private_key_path: "/secrets/internal_jwt_private.key"

  # Rate limiting
  rate_limit_rps: 100
  rate_limit_burst: 200

  # Timeouts
  proxy_timeout: "30s"
  shutdown_timeout: "30s"

  # Base URL for OIDC callbacks
  base_url: "http://localhost:8080"

  # Built-in authentication
  built_in_auth:
    enabled: true
    allow_registration: false
    email_verification_required: false
    admin_only: false
    # Uncomment to create initial admin user
    # init_user:
    #   email: "admin@localhost"
    #   password: "change-me-in-production"
    #   name: "Admin"

  # OIDC providers (optional)
  # oidc_providers:
  #   - id: "github"
  #     name: "GitHub"
  #     enabled: true
  #     client_id: "${GITHUB_CLIENT_ID}"
  #     client_secret: "${GITHUB_CLIENT_SECRET}"
  #     discovery_url: "https://github.com/.well-known/openid-configuration"
  #     scopes: ["openid", "email", "profile"]
  #     auto_provision: true
