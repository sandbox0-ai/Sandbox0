{{- $global := .Values.global | default dict }}
{{- $internalAuth := (get $global "internalAuth") | default dict }}
{{- $controlPlane := (get $internalAuth "controlPlane") | default dict }}
{{- $jwt := (get $global "jwt") | default dict }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-gateway.fullname" . }}
  labels:
    {{- include "edge-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "edge-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "edge-gateway.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "edge-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SERVICE
              value: "edge-gateway"
            - name: CONFIG_PATH
              value: "/config/config.yaml"
          ports:
            - name: http
              containerPort: {{ .Values.config.http_port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: internal-jwt-private-key
              mountPath: /secrets/internal_jwt_private.key
              subPath: internal_jwt_private.key
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "edge-gateway.fullname" . }}
        - name: internal-jwt-private-key
          secret:
            secretName: {{ .Values.secrets.internalJwtSecretName | default $controlPlane.secretName | default $jwt.internalJwtSecretName }}
            items:
              - key: {{ .Values.secrets.internalJwtPrivateKeyKey | default $controlPlane.privateKeyKey | default $jwt.privateKeyKey }}
                path: internal_jwt_private.key
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
