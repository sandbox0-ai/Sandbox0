apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: v1
kind: Secret
metadata:
  name: sandbox0-control-plane-db
  namespace: sandbox0-system
type: Opaque
stringData:
  password: "sandbox0"
---
apiVersion: v1
kind: Secret
metadata:
  name: sandbox0-control-plane-s3
  namespace: sandbox0-system
type: Opaque
stringData:
  accessKeyId: "sandbox0"
  secretAccessKey: "sandbox0"
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: sandbox0-control-plane
  namespace: sandbox0-system
spec:
  mode: control-plane
  version: "latest"
  database:
    type: postgres
    external:
      host: "control-plane-db.sandbox0-system.svc.cluster.local"
      port: 5432
      database: "sandbox0"
      username: "sandbox0"
      passwordSecret:
        name: sandbox0-control-plane-db
        key: password
  storage:
    type: s3
    s3:
      bucket: "sandbox0"
      region: "us-east-1"
      endpoint: "http://control-plane-s3.sandbox0-system.svc.cluster.local"
      credentialsSecret:
        name: sandbox0-control-plane-s3
  services:
    edgeGateway:
      enabled: true
      replicas: 1
    scheduler:
      enabled: true
      replicas: 1
