apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: sandbox0-all
  namespace: sandbox0-system
spec:
  mode: all
  version: "latest"
  database:
    type: builtin
    builtin:
      enabled: true
  storage:
    type: builtin
    builtin:
      enabled: true
  services:
    edgeGateway:
      enabled: true
      replicas: 1
    scheduler:
      enabled: true
      replicas: 1
    internalGateway:
      enabled: true
      replicas: 1
    manager:
      enabled: true
      replicas: 1
    storageProxy:
      enabled: true
      replicas: 1
    netd:
      enabled: true
      replicas: 1
