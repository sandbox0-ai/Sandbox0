apiVersion: v1
kind: Namespace
metadata:
  name: sandbox0-system
---
apiVersion: v1
kind: Secret
metadata:
  name: sandbox0-data-plane-db
  namespace: sandbox0-system
type: Opaque
stringData:
  password: "sandbox0"
---
apiVersion: v1
kind: Secret
metadata:
  name: sandbox0-data-plane-s3
  namespace: sandbox0-system
type: Opaque
stringData:
  accessKeyId: "sandbox0"
  secretAccessKey: "sandbox0"
---
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: sandbox0-data-plane
  namespace: sandbox0-system
spec:
  mode: data-plane
  version: "latest"
  controlPlane:
    url: "http://sandbox0-control-plane-edge-gateway.sandbox0-system.svc.cluster.local:80"
    internalAuthPublicKeySecret:
      name: sandbox0-control-plane-sandbox0-internal-jwt-control-plane
      key: public.key
  database:
    type: postgres
    external:
      host: "data-plane-db.sandbox0-system.svc.cluster.local"
      port: 5432
      database: "sandbox0"
      username: "sandbox0"
      passwordSecret:
        name: sandbox0-data-plane-db
        key: password
  storage:
    type: s3
    s3:
      bucket: "sandbox0"
      region: "us-east-1"
      endpoint: "http://data-plane-s3.sandbox0-system.svc.cluster.local"
      credentialsSecret:
        name: sandbox0-data-plane-s3
  services:
    internalGateway:
      enabled: true
      replicas: 1
    manager:
      enabled: true
      replicas: 1
    storageProxy:
      enabled: true
      replicas: 1
    netd:
      enabled: true
      replicas: 1
