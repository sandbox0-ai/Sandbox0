version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      - linters:
          - staticcheck
        text: "ST1000:"
      - linters:
          - staticcheck
        text: "ST1003:"
      - linters:
          - staticcheck
        text: "ST1020:"
      - linters:
          - staticcheck
        text: "ST1021:"
      - linters:
          - staticcheck
        text: "SA1019:"
      - path: (^|/)tests/e2e/
        linters:
          - staticcheck
        text: "ST1001:"
      - path: (^|/)infra-operator/internal/controller/suite_test\\.go$
        linters:
          - staticcheck
        text: "ST1001:"
      - path: (^|/)k8s-plugin/deviceplugin\\.go$
        linters:
          - staticcheck
        text: "SA1019:"
      - path: (^|/)manager/pkg/controller/.*_test\\.go$
        linters:
          - unused
      - path: (^|/)tests/integration/
        linters:
          - unused
